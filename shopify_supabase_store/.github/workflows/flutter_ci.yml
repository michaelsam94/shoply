name: Flutter CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: flutter pub get
      - name: Format check
        run: dart format --set-exit-if-changed lib test scripts
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
